<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Results</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="background">
    <div class="blur one"></div>
    <div class="blur two"></div>
</div>

<div class="result-page">

    <div class="result-card">

        <div class="score-circle">

            <svg>

                <circle class="bg" cx="100" cy="100" r="85"></circle>

                <circle class="progress" cx="100" cy="100" r="85"></circle>

            </svg>

            <div class="score-text">

                <h1 id="scoreValue">0%</h1>

                <p>Accuracy</p>

            </div>

        </div>

        <h2>Excellent Work 🎉</h2>

        <p class="subtitle">
            Keep learning and improve your English every day.
        </p>

        <div class="stats-grid">

            <div class="stat-box">

                <i class="fa-solid fa-star"></i>

                <h3 id="xpValue">0</h3>

                <span>XP Earned</span>

            </div>

            <div class="stat-box">

                <i class="fa-solid fa-check"></i>

                <h3 id="correctValue">0</h3>

                <span>Correct</span>

            </div>

            <div class="stat-box">

                <i class="fa-solid fa-fire"></i>

                <h3 id="streakValue">1</h3>

                <span>Streak</span>

            </div>

            <div class="stat-box">

                <i class="fa-solid fa-trophy"></i>

                <h3 id="rankValue">A</h3>

                <span>Rank</span>

            </div>

        </div>

        <div class="buttons">

            <a href="game.html" class="btn-primary">

                <i class="fa-solid fa-rotate-right"></i>

                Play Again

            </a>

            <a href="index.html" class="btn-secondary">

                <i class="fa-solid fa-house"></i>

                Home

            </a>

        </div>

    </div>

</div>

<script src="js/result.js"></script>

</body>

</html>
